name: Build and Release Minecraft Plugin

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, damit die Action Dateien an das Release anhängen darf

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    # Optional: Benennt die Datei im target-Ordner um, damit sie die Versionsnummer des Tags trägt
    - name: Rename JAR with Tag Version
      run: |
        cd target
        # Sucht die erstellte jar (schließt originale/shaded Versionen aus, falls vorhanden)
        JAR_FILE=$(ls *.jar | head -n 1)
        # Benennt sie um zu "MeinPlugin-v1.0.0.jar" (je nach deinem Tag)
        mv "$JAR_FILE" "plugin-${{ github.event.release.tag_name }}.jar"

    - name: Upload Binaries to Release
      uses: softprops/action-gh-release@v2
      with:
        # Lädt die umbenannte JAR-Datei direkt in das erstellte Release hoch
        files: target/plugin-${{ github.event.release.tag_name }}.jar
      env:
        GITHUB_TOKEN: ${{ github.token }}
