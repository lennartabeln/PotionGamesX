name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine version
      id: version
      run: |
        BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "tag=${BASE}" >> "$GITHUB_OUTPUT"

    - name: Check tag existence
      id: check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine prerelease
      id: prerelease
      if: steps.check.outputs.exists != 'true'
      run: |
        BASE="${{ steps.version.outputs.base }}"
        if [[ "$BASE" == *-* ]]; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build
      if: steps.check.outputs.exists != 'true'
      run: mvn clean package

    - name: Extract changelog for release
      id: changelog
      if: steps.check.outputs.exists != 'true'
      run: |
        VERSION="${{ steps.version.outputs.base }}"
        VERSION="${VERSION%%-*}"
        python3 -c "
        import re, sys
        version = '$VERSION'
        header = re.compile(r'^##\s+\[' + re.escape(version) + r'\]')
        end = re.compile(r'^##\s')
        with open('CHANGELOG.md') as f:
            lines = f.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        if body:
            sys.stdout.write(''.join(body).strip())
        else:
            sys.stdout.write('No changelog entry found for version $VERSION')
        " > /tmp/release_body.txt

    - name: Create Release
      if: steps.check.outputs.exists != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PotionGamesX-${{ steps.version.outputs.base }}
        files: target/PotionGamesX-*.jar
        prerelease: ${{ steps.prerelease.outputs.value }}
        body_path: /tmp/release_body.txt
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
