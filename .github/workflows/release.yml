name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine version
      id: version
      run: |
        BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "tag=${BASE}" >> "$GITHUB_OUTPUT"

    - name: Check tag existence
      id: check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine prerelease
      id: prerelease
      if: steps.check.outputs.exists != 'true'
      run: |
        BASE="${{ steps.version.outputs.base }}"
        if [[ "$BASE" == *-* ]]; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build
      if: steps.check.outputs.exists != 'true'
      run: mvn clean package

    - name: Get previous pre-release body
      id: prev_release
      if: steps.check.outputs.exists != 'true' && steps.prerelease.outputs.value == 'true'
      run: |
        VERSION="${{ steps.version.outputs.base }}"
        BASE="${VERSION%-dev.*}"
        NUM="${VERSION##*-dev.}"
        PREV_NUM=$((NUM - 1))
        PREV_TAG="${BASE}-dev.${PREV_NUM}"
        if gh release view "$PREV_TAG" --json body --jq '.body' > /tmp/prev_body.txt 2>/dev/null; then
          echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
        else
          echo "previous_tag=" >> "$GITHUB_OUTPUT"
        fi
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Extract changelog for release
      id: changelog
      if: steps.check.outputs.exists != 'true'
      run: |
        VERSION="${{ steps.version.outputs.base }}"
        is_prerelease=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")
        python3 -c "
        import re, sys
        version = '$VERSION'
        is_prerelease = '-' in version
        target = 'Unreleased' if is_prerelease else version
        header = re.compile(r'^##\s+\[' + re.escape(target) + r'\]')
        end = re.compile(r'^##\s')
        with open('CHANGELOG.md') as f:
            lines = f.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        sys.stdout.write(''.join(body).strip())
        " > /tmp/new_changelog.txt

        PREV_TAG='${{ steps.prev_release.outputs.previous_tag }}'
        if [ "$is_prerelease" = "true" ] && [ -n "$PREV_TAG" ] && [ -s /tmp/prev_body.txt ]; then
          PREV_BODY=$(cat /tmp/prev_body.txt)
          NEW_CHANGES=$(cat /tmp/new_changelog.txt)
          case "$PREV_BODY" in *"$NEW_CHANGES"*) ;; *) contained="false" ;; esac
          if [ -z "${contained:-}" ]; then
            echo "$PREV_BODY" > /tmp/release_body.txt
          else
            printf '%s\n\n### New in this release\n%s' "$PREV_BODY" "$NEW_CHANGES" > /tmp/release_body.txt
          fi
        elif [ -s /tmp/new_changelog.txt ]; then
          cat /tmp/new_changelog.txt > /tmp/release_body.txt
        else
          echo "No changelog entry found for $( [ "$is_prerelease" = 'true' ] && echo '[Unreleased]' || echo \"version $VERSION\" )" > /tmp/release_body.txt
        fi

    - name: Create Release
      if: steps.check.outputs.exists != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PotionGamesX-${{ steps.version.outputs.base }}
        files: target/PotionGamesX-*.jar
        prerelease: ${{ steps.prerelease.outputs.value }}
        body_path: /tmp/release_body.txt
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
