name: Auto Release

on:
  push:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine version
      id: version
      run: |
        BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        if [ "${{ github.ref_name }}" = "dev" ]; then
          TAG="v${BASE}-dev.${{ github.run_number }}"
        else
          TAG="v${BASE}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "Version: $TAG"

    - name: Check tag existence (main only)
      id: check_tag
      if: github.ref_name == 'main'
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Sync dev version (dev only)
      if: github.ref_name == 'dev'
      run: |
        mvn versions:set \
          -DnewVersion=${{ steps.version.outputs.tag }} \
          -DgenerateBackupPoms=false

    - name: Build
      run: mvn clean package

    - name: Create Release
      if: steps.check_tag.outputs.exists != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: "PotionGamesX-${{ steps.version.outputs.tag }}"
        files: target/PotionGamesX-*.jar
        prerelease: ${{ github.ref_name == 'dev' }}
        generate_release_notes: true
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Create sync PR (main → dev)
      if: github.ref_name == 'main'
      run: |
        BRANCH="sync/main-into-dev-$(date +%s)"
        git checkout -b "$BRANCH"
        git push origin "$BRANCH"
        PR_URL=$(gh pr create \
          --base dev \
          --head "$BRANCH" \
          --title "Sync main into dev" \
          --body "Automated sync after merge into main." \
          --label "dependencies" 2>/dev/null) && \
        gh pr review "$PR_URL" --approve && \
        gh pr merge "$PR_URL" --auto --squash || echo "PR creation or auto-merge skipped"
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
