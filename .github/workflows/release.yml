name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine version
      id: version
      run: |
        BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "tag=${BASE}" >> "$GITHUB_OUTPUT"

    - name: Check tag existence
      id: check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine prerelease
      id: prerelease
      if: steps.check.outputs.exists != 'true'
      run: |
        BASE="${{ steps.version.outputs.base }}"
        if [[ "$BASE" == *-* ]]; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build
      if: steps.check.outputs.exists != 'true'
      run: mvn clean package

    - name: Get previous tag and release body
      id: prev_release
      if: steps.check.outputs.exists != 'true' && steps.prerelease.outputs.value == 'true'
      run: |
        VERSION="${{ steps.version.outputs.base }}"
        NUM="${VERSION##*-dev.}"
        PREV_NUM=$((NUM - 1))
        PREV_TAG="${VERSION%-dev.*}-dev.${PREV_NUM}"
        echo "previous_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
        gh release view "$PREV_TAG" --json body --jq '.body' > /tmp/prev_body.txt 2>/dev/null || true
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Extract changelog for release
      id: changelog
      if: steps.check.outputs.exists != 'true'
      run: |
        extract_section() {
          python3 -c "
        import re, sys
        target = '$1'
        header = re.compile(r'^##\s+\[' + re.escape(target) + r'\]')
        end = re.compile(r'^##\s')
        with open('CHANGELOG.md') as f:
            lines = f.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        sys.stdout.write(''.join(body).strip())
        "
        }

        VERSION="${{ steps.version.outputs.base }}"
        is_prerelease=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        if [ "$is_prerelease" = "true" ]; then
          PREV_TAG='${{ steps.prev_release.outputs.previous_tag }}'
          # Extract current [Unreleased]
          extract_section "Unreleased" > /tmp/current_unreleased.txt

          # Extract [Unreleased] from previous tag's CHANGELOG.md
          if [ -n "$PREV_TAG" ] && git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            git show "$PREV_TAG:CHANGELOG.md" 2>/dev/null | python3 -c "
        import re, sys
        target = 'Unreleased'
        header = re.compile(r'^##\s+\[' + re.escape(target) + r'\]')
        end = re.compile(r'^##\s')
        lines = sys.stdin.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        sys.stdout.write(''.join(body).strip())
        " > /tmp/prev_unreleased.txt 2>/dev/null || true
          fi

          # Diff to find only new lines
          if [ -s /tmp/prev_unreleased.txt ]; then
            python3 -c "
        import sys
        old = set(open('/tmp/prev_unreleased.txt').read().splitlines())
        new = open('/tmp/current_unreleased.txt').read().splitlines()
        out = [l for l in new if l.strip() and l not in old]
        sys.stdout.write('\n'.join(out))
        " > /tmp/new_entries.txt
          else
            cp /tmp/current_unreleased.txt /tmp/new_entries.txt
          fi

          # Build release body: previous body + new entries
          PREV_BODY=$(cat /tmp/prev_body.txt 2>/dev/null || echo "")
          NEW_ENTRIES=$(cat /tmp/new_entries.txt)
          if [ -n "$PREV_BODY" ]; then
            if [ -n "$NEW_ENTRIES" ]; then
              printf '%s\n\n### New in this release\n%s\n' "$PREV_BODY" "$NEW_ENTRIES" > /tmp/release_body.txt
            else
              echo "$PREV_BODY" > /tmp/release_body.txt
            fi
          elif [ -n "$NEW_ENTRIES" ]; then
            printf '%s\n' "$NEW_ENTRIES" > /tmp/release_body.txt
          else
            echo "No changelog entry found for [Unreleased]" > /tmp/release_body.txt
          fi
        else
          # Full release: extract version section
          extract_section "$VERSION" > /tmp/release_body.txt
          if [ ! -s /tmp/release_body.txt ]; then
            echo "No changelog entry found for version $VERSION" > /tmp/release_body.txt
          fi
        fi

    - name: Create Release
      if: steps.check.outputs.exists != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PotionGamesX-${{ steps.version.outputs.base }}
        files: target/PotionGamesX-*.jar
        prerelease: ${{ steps.prerelease.outputs.value }}
        body_path: /tmp/release_body.txt
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
