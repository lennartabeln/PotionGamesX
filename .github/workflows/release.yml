name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine version
      id: version
      run: |
        BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "base=$BASE" >> "$GITHUB_OUTPUT"
        echo "tag=${BASE}" >> "$GITHUB_OUTPUT"

    - name: Check tag existence
      id: check
      run: |
        if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Determine prerelease
      id: prerelease
      if: steps.check.outputs.exists != 'true'
      run: |
        BASE="${{ steps.version.outputs.base }}"
        if [[ "$BASE" == *-* ]]; then
          echo "value=true" >> "$GITHUB_OUTPUT"
        else
          echo "value=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build
      if: steps.check.outputs.exists != 'true'
      run: mvn clean package

    - name: Extract changelog for release
      id: changelog
      if: steps.check.outputs.exists != 'true'
      run: |
        extract_section() {
          python3 -c "
        import re, sys
        target = '$1'
        header = re.compile(r'^##\s+\[' + re.escape(target) + r'\]')
        end = re.compile(r'^##\s')
        with open('CHANGELOG.md') as f:
            lines = f.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        sys.stdout.write(''.join(body).strip())
        "
        }

        VERSION="${{ steps.version.outputs.base }}"
        is_prerelease=$(echo "$VERSION" | grep -q '-' && echo "true" || echo "false")

        if [ "$is_prerelease" = "true" ]; then
          extract_section "Unreleased" > /tmp/current_unreleased.txt

          PREV_NUM=$((${VERSION##*-dev.} - 1))
          PREV_TAG="${VERSION%-dev.*}-dev.${PREV_NUM}"

          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            git show "$PREV_TAG:CHANGELOG.md" 2>/dev/null | python3 -c "
        import re, sys
        target = 'Unreleased'
        header = re.compile(r'^##\s+\[' + re.escape(target) + r'\]')
        end = re.compile(r'^##\s')
        lines = sys.stdin.readlines()
        capture = False
        body = []
        for line in lines:
            if end.match(line):
                if capture:
                    break
                if header.match(line):
                    capture = True
                    continue
            if capture:
                body.append(line)
        sys.stdout.write(''.join(body).strip())
        " > /tmp/prev_unreleased.txt 2>/dev/null || true
          fi

          python3 -c "
        import sys

        def collect_entries(lines):
            entries = set()
            for line in lines:
                s = line.strip()
                if s and not s.startswith('### '):
                    entries.add(s)
            return entries

        with open('/tmp/current_unreleased.txt') as f:
            current = f.readlines()

        prev = set()
        try:
            with open('/tmp/prev_unreleased.txt') as f:
                prev = collect_entries(f.readlines())
        except FileNotFoundError:
            prev = set()

        if not prev:
            sys.stdout.write(''.join(current).strip())
        else:
            out = []
            in_cat = None
            cat_active = False

            for line in current:
                s = line.strip()
                if s.startswith('### '):
                    in_cat = s
                    cat_active = False
                elif s and not s.startswith('### '):
                    if s not in prev:
                        if not cat_active:
                            if out:
                                out.append('\n')
                            out.append(in_cat + '\n')
                            cat_active = True
                        out.append(line)
                else:
                    if cat_active:
                        out.append(line)

            sys.stdout.write(''.join(out).strip())
        " > /tmp/release_body.txt
        else
          extract_section "$VERSION" > /tmp/release_body.txt
        fi

        if [ ! -s /tmp/release_body.txt ]; then
          echo "No changelog entry found" > /tmp/release_body.txt
        fi

    - name: Create Release
      if: steps.check.outputs.exists != 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PotionGamesX-${{ steps.version.outputs.base }}
        files: target/PotionGamesX-*.jar
        prerelease: ${{ steps.prerelease.outputs.value }}
        body_path: /tmp/release_body.txt
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
