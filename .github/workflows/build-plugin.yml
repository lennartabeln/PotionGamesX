name: Build and Release Minecraft Plugin

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Determine Version
      id: get_version
      run: |
        # Use tag name if available, otherwise fallback to plugin.yml
        TAG_VERSION="${{ github.event.release.tag_name }}"
        if [ -z "$TAG_VERSION" ]; then
          TAG_VERSION=$(grep '^version:' src/main/resources/plugin.yml | cut -d ':' -f 2 | tr -d ' ')
        fi
        # Remove 'v' prefix if present for Maven versioning
        MAVEN_VERSION=$(echo "$TAG_VERSION" | sed 's/^v//')
        echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
        echo "maven_version=$MAVEN_VERSION" >> $GITHUB_OUTPUT
        echo "VERSION determined: $TAG_VERSION"
        echo "MAVEN_VERSION determined: $MAVEN_VERSION"

    - name: Update Versions (plugin.yml and pom.xml)
      run: |
        # Sync plugin.yml version
        sed -i "s/^version: .*/version: ${{ steps.get_version.outputs.version }}/" src/main/resources/plugin.yml
        # Sync pom.xml version
        mvn versions:set -DnewVersion=${{ steps.get_version.outputs.maven_version }} -DgenerateBackupPoms=false

    - name: Build with Maven
      run: mvn clean package

    - name: Rename JAR with Version
      run: |
        cd target
        # Find the main JAR file (excluding 'original' or 'shaded' JARs)
        JAR_FILE=$(ls *.jar | grep -v "original-" | grep -v "shaded" | head -n 1)
        NEW_NAME="PotionGamesX-${{ steps.get_version.outputs.version }}.jar"
        echo "Found JAR: $JAR_FILE"
        echo "Target Name: $NEW_NAME"
        if [ "$JAR_FILE" != "$NEW_NAME" ]; then
          mv "$JAR_FILE" "$NEW_NAME"
        else
          echo "JAR already has the correct name. Skipping rename."
        fi

    - name: Upload Binaries to Release
      uses: softprops/action-gh-release@v2
      with:
        name: "PotionGamesX-${{ steps.get_version.outputs.version }}"
        files: target/PotionGamesX-${{ steps.get_version.outputs.version }}.jar
        prerelease: ${{ github.event.release.prerelease }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
