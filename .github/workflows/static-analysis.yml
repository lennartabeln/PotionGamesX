name: Static Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      fail_on_violation:
        description: 'Fail the job on violations (default: false)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build package
        run: mvn -DskipTests clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: target/*.jar

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: build
    # Non-blocking by default: continue-on-error allows PRs to pass even if analysis fails.
    # To make the workflow fail on violations, remove the continue-on-error line or set it to false.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run PMD
        run: mvn -DskipTests pmd:pmd

      - name: Run SpotBugs
        run: mvn -DskipTests com.github.spotbugs:spotbugs-maven-plugin:4.9.8.3:spotbugs

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            target/pmd.xml
            target/site/pmd.html
            target/spotbugsXml.xml
            target/site/spotbugs.html
