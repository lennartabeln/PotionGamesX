version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "io.papermc.paper:paper-api"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.spigotmc:spigot-api"
        update-types: ["version-update:semver-major"]
