# PotionGames Shop Configuration
# Each entry defines a purchasable potion effect in the in-game shop.
# Structure:
#   pg.potions.<id>:
#     name:             Display name of the potion
#     shoppotion:       PotionEffect applied to the buyer
#     shoppotiontype:   ItemStack material shown in the shop GUI
#     kit:              Kit category (Fighter, Healer, Looter, Ghost, Tank)
#     cost:             Price in coins
#     sale:             Resale value in coins

pg:
  potions:
    1:
      name: "JUMP_BOOST"
      shoppotion:
        ==: PotionEffect
        effect: JUMP_BOOST
        duration: 600
        amplifier: 1
        ambient: true
        has-particles: true
        has-icon: true
      shoppotiontype:
        ==: org.bukkit.inventory.ItemStack
        type: POTION
        amount: 1
      kit: Looter
      cost: 4
      sale: 2
