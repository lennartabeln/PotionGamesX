#   pg.potions.<id>:
#     name:             Display name of the potion
#     shoppotion:       PotionEffect configuration (type, duration, amplifier, ambient, particles, icon)
#     shoppotiontype:   ItemStack shown in the shop GUI (material, amount)
#     kit:              Kit category (Fighter, Healer, Looter, Ghost, Tank)
#     cost:             Price in coins
#     sale:             Resale value in coins

