# PotionGames Chest Loot Configuration
# Defines loot tables for chests found in-game
# factor: 1.0 = default density, 0.5 = half, 2.0 = double

pg:
  chestloot:
    normal:
      loot:
        factor: 1.0
        food1: 20.0
        food2: 10.0
        armour1: 15.0
        armour2: 15.0
        armour3: 7.0
        armour4: 5.0
        armour5: 3.0
        weapons1: 20.0
        weapons2: 5.0

      items:
        food1:
          - "CAKE:1"
          - "BREAD:3"
          - "PUMPKIN_PIE:3"
          - "COOKIE:3"
          - "BAKED_POTATO:3"
        food2:
