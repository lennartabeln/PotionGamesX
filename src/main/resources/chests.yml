          - "MUSHROOM_STEW:1"
          - "BEETROOT_SOUP:1"
          - "GOLDEN_CARROT:1"
          - "MILK_BUCKET:1"
        armour1:
          - "LEATHER_HELMET:1"
          - "LEATHER_CHESTPLATE:1"
          - "LEATHER_LEGGINGS:1"
          - "LEATHER_BOOTS:1"
