# PotionGames Configuration File
# Minecraft Paper 26.1.x
#
# Data Organization:
#   config.yml (this file): Global settings, database, feature toggles
#   lobbies.yml: Lobbies, arenas, spawns (all locations)
#   chests.yml: Chest loot item definitions
#   messages.yml: Localized text messages
#   kits.yml: Kit definitions
#   shop.yml: Shop items

pg:
  # ═══════════════════════════════════════════════════════
  # CORE SETTINGS
  # ═══════════════════════════════════════════════════════

  gameServer: true
  language: en_US

  # BungeeCord / Proxy network support
  # When game ends, players are sent back to this server
  bungeeServer: lobby

  # ═══════════════════════════════════════════════════════
  # DATABASE CONFIGURATION
  # ═══════════════════════════════════════════════════════

  activateMySQL: false
  mysql:
    host: localhost
    port: "3306"
    database: potiongames
    user: root
    password: "admin"

  # ═══════════════════════════════════════════════════════
  # DEFAULT GAME SETTINGS
  # (Applied to all lobbies unless overridden)
  # ═══════════════════════════════════════════════════════

  defaults:
    # Timing
    countdown: 60              # Seconds before game starts
    roundTime: 30              # Minutes per round

    # Player limits
    maxPlayers: 24
    minPlayers: 2
    teamSize: 2

    # Feature flags
    activateAirdrops: true
    activateKits: true
    activateShop: true
    activateTeams: true

  # ═══════════════════════════════════════════════════════
  # GLOBAL FEATURES
  # ═══════════════════════════════════════════════════════

  # Gameplay
  activateDeathmatch: true
  activateScoreboard: true
  broadcastStarting: false
  changeGamerules: true
  friendlyFire: false
  joinStarted: false

  # Player behavior
  allowOutsideChat: false
  compassOnSpawn: false
  startOnJoin: false

  # Economy (requires Vault)
  enableRewards: false
  killReward: 10               # Coins per kill
  winningReward: 100           # Coins for winning a round

  # Content limits
  activeKits: 6                # Number of player kits
  activePotions: 19            # Number of shop potions

  # ═══════════════════════════════════════════════════════
  # PERFORMANCE & LOGGING
  # ═══════════════════════════════════════════════════════

  logging:
    level: INFO                 # Log level: INFO, DEBUG, TRACE
    toFile: false               # Save logs to file
    filePath: "logs/potiongames.log"

  performance:
    lobbyUpdateRate: 2          # Ticks between lobby updates (20 = 1 sec)
    maxConcurrentGames: 10      # Maximum simultaneous games
    scoreboardUpdateRate: 5     # Ticks between scoreboard updates

  # ═══════════════════════════════════════════════════════
  # SECURITY & RESTRICTIONS
  # ═══════════════════════════════════════════════════════

  security:
    antiCheatEnabled: false     # Auto-kick suspicious patterns
    bannedItems: ""             # Comma-separated banned items
    maxPlayersPerIP: 0          # 0 = unlimited
